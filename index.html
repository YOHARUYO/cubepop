<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUBE POP — 스테이지 모드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
  body{
    background:#12151d;color:#e8eaf0;
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
    min-height:100vh;padding:16px;display:flex;justify-content:center;
  }
  .app{width:100%;max-width:460px;display:flex;flex-direction:column;gap:11px;}
  .card{background:#1b1f2a;border:1px solid #2a3040;border-radius:14px;padding:12px;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;flex-direction:column;gap:10px;}
  .stageHead{display:flex;align-items:baseline;justify-content:space-between;}
  .stageHead .sn{font-size:22px;font-weight:900;letter-spacing:1px;}
  .stageHead .colors{font-size:11px;color:#8b93a7;}
  .stats{display:flex;gap:8px;}
  .stat{flex:1;background:#242a38;border:1px solid #303748;border-radius:10px;padding:7px 6px;text-align:center;}
  .stat .v{font-size:19px;font-weight:800;}
  .stat .k{font-size:9.5px;color:#8b93a7;margin-top:1px;}
  #movesV.low{color:#ff5d73;}

  /* ---------- goals (horizontal) ---------- */
  .goalsCard h2{font-size:10.5px;color:#8b93a7;margin-bottom:8px;font-weight:700;letter-spacing:.5px;}
  .goalsRow{display:flex;gap:8px;}
  .gchip{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:9px 6px;border-radius:11px;background:#242a38;border:1px solid #303748;
  }
  .gchip .dot{
    width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:rgba(0,0,0,.5);box-shadow:inset 0 0 0 2px rgba(0,0,0,.22);
  }
  .gchip .bar{width:100%;height:6px;background:#181c26;border-radius:4px;overflow:hidden;}
  .gchip .bar span{display:block;height:100%;border-radius:4px;transition:width .3s;}
  .gchip .cnt{font-size:13px;font-weight:800;}
  .gchip.done{border-color:#06d6a0;}
  .gchip.done .cnt{color:#06d6a0;}

  /* ---------- board ---------- */
  .boardWrap{align-self:center;}
  #board{position:relative;background:#171b25;border:1px solid #2a3040;border-radius:16px;padding:10px;}
  #boardInner{position:relative;}
  .slot{position:absolute;width:64px;height:64px;border-radius:11px;background:#1f2431;}

  .cube{
    position:absolute;width:64px;height:64px;
    transition:transform .26s cubic-bezier(.3,1.2,.4,1),opacity .24s ease;
    cursor:grab;touch-action:none;
  }
  .cube:active{cursor:grabbing;}
  .ringBox{position:absolute;inset:0;border-radius:11px;overflow:hidden;filter:brightness(.72) saturate(.9);}
  .hN,.hS,.hE,.hW{position:absolute;inset:0;}
  .hN{clip-path:polygon(0 0,100% 0,79% 21%,21% 21%);}
  .hS{clip-path:polygon(0 100%,100% 100%,79% 79%,21% 79%);}
  .hE{clip-path:polygon(100% 0,100% 100%,79% 79%,79% 21%);}
  .hW{clip-path:polygon(0 0,0 100%,21% 79%,21% 21%);}
  .cubeBox{position:absolute;inset:8px;perspective:340px;}
  .cubeW{
    position:absolute;inset:0;transform-style:preserve-3d;
    transform:rotateX(14deg);
    transition:transform .26s cubic-bezier(.35,.9,.4,1);
  }
  .cf{
    position:absolute;width:48px;height:48px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:19px;color:rgba(0,0,0,.5);
    backface-visibility:hidden;box-shadow:inset 0 0 0 2px rgba(0,0,0,.22);
  }
  .cfF{transform:translateZ(24px);}
  .cfB{transform:rotateY(180deg) translateZ(24px);}
  .cfR{transform:rotateY(90deg) translateZ(24px);filter:brightness(.78);}
  .cfL{transform:rotateY(-90deg) translateZ(24px);filter:brightness(.78);}
  .cfT{transform:rotateX(90deg) translateZ(24px);filter:brightness(.85);}
  .cfBo{transform:rotateX(-90deg) translateZ(24px);filter:brightness(.68);}

  /* ---------- line bomb token ---------- */
  .bomb{cursor:default;animation:bombPulse .85s infinite alternate;}
  .bomb .bombFace{
    position:absolute;inset:0;border-radius:11px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.35),0 3px 7px rgba(0,0,0,.45);
  }
  .bomb .bsym{font-size:19px;font-weight:900;color:rgba(0,0,0,.62);z-index:2;position:relative;}
  .bomb .stripe{position:absolute;background:rgba(255,255,255,.94);box-shadow:0 0 5px rgba(255,255,255,.55);}
  .stripeH{left:-6%;right:-6%;height:33%;top:33.5%;border-top:2px solid rgba(0,0,0,.32);border-bottom:2px solid rgba(0,0,0,.32);}
  .stripeV{top:-6%;bottom:-6%;width:33%;left:33.5%;border-left:2px solid rgba(0,0,0,.32);border-right:2px solid rgba(0,0,0,.32);}
  /* outward arrowheads showing blast direction */
  .stripeH::before,.stripeH::after{content:"";position:absolute;top:50%;transform:translateY(-50%);border:6px solid transparent;}
  .stripeH::before{left:1px;border-right-color:rgba(0,0,0,.45);}
  .stripeH::after{right:1px;border-left-color:rgba(0,0,0,.45);}
  .stripeV::before,.stripeV::after{content:"";position:absolute;left:50%;transform:translateX(-50%);border:6px solid transparent;}
  .stripeV::before{top:1px;border-bottom-color:rgba(0,0,0,.45);}
  .stripeV::after{bottom:1px;border-top-color:rgba(0,0,0,.45);}
  /* area bomb: circular radial burst (clears surrounding 9) */
  .bomb .burst{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:74%;height:74%;border-radius:50%;
    border:3px solid rgba(255,255,255,.92);
    background:radial-gradient(circle,rgba(255,255,255,.6) 0 32%,rgba(255,255,255,.12) 40% 60%,transparent 63%);
    box-shadow:0 0 7px rgba(255,255,255,.5),inset 0 0 6px rgba(255,255,255,.45);
  }
  @keyframes bombPulse{from{filter:brightness(1);}to{filter:brightness(1.2);}}
  /* "뿅!" spawn pop — runs on the inner face so it won't fight the outer fall(translate) */
  @keyframes bombPop{0%{transform:scale(.05);opacity:.15;}55%{transform:scale(1.32);opacity:1;}78%{transform:scale(.92);}100%{transform:scale(1);}}
  .bomb.spawning{z-index:15;}
  .bomb.spawning .bombFace{animation:bombPop .38s cubic-bezier(.3,1.5,.5,1);}
  /* spawn flash ring */
  .bomb.spawning::after{
    content:"";position:absolute;inset:-6px;border-radius:15px;pointer-events:none;
    border:3px solid rgba(255,255,255,.9);animation:bombRing .42s ease-out forwards;
  }
  @keyframes bombRing{0%{transform:scale(.4);opacity:.9;}100%{transform:scale(1.35);opacity:0;}}

  .float{
    position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);
    font-size:26px;font-weight:900;color:#ffd166;text-shadow:0 2px 8px rgba(0,0,0,.6);
    pointer-events:none;animation:floatUp .9s ease forwards;z-index:20;white-space:nowrap;
  }
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,-30%) scale(.6);}25%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}70%{opacity:1;}100%{opacity:0;transform:translate(-50%,-90%) scale(1);}}

  #skipBtn{
    position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:25;
    padding:11px 24px;border-radius:24px;border:none;background:#06d6a0;color:#08382c;
    font-weight:900;font-size:14px;cursor:pointer;display:none;font-family:inherit;
    box-shadow:0 4px 16px rgba(0,0,0,.45);animation:skipPulse .7s infinite alternate;
  }
  #skipBtn.show{display:block;}
  @keyframes skipPulse{from{transform:translateX(-50%) scale(1);}to{transform:translateX(-50%) scale(1.07);}}

  #overlay{
    position:absolute;inset:0;background:rgba(14,16,24,.86);border-radius:16px;z-index:30;
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:16px;
  }
  #overlay.show{display:flex;}
  #ovStars{font-size:34px;letter-spacing:6px;}
  #ovStars .off{opacity:.22;}
  #ovTitle{font-size:26px;font-weight:900;}
  #ovSub{font-size:13px;color:#aab2c5;line-height:1.7;}
  #ovBtns{margin-top:8px;display:flex;gap:8px;width:230px;}
  #ovBtns button{flex:1;padding:10px 6px;border-radius:10px;border:none;background:#323a4d;color:#dfe3ee;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  #ovBtns .primary{background:#0e7c66;}

  /* ---------- controls ---------- */
  .controls{display:flex;gap:8px;}
  .controls button{
    flex:1;padding:10px 6px;border-radius:11px;border:none;background:#323a4d;color:#dfe3ee;
    font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .controls button:hover{background:#3d4763;}
  .cubeBtn{flex:1.4 !important;display:flex;align-items:center;justify-content:center;gap:9px;background:#2b3a55 !important;}
  .cubeBtn:hover{background:#33456a !important;}
  .miniWrap{width:34px;height:34px;perspective:150px;flex:none;}
  .cube3d.mini{width:34px;height:34px;position:relative;transform-style:preserve-3d;transform:rotateX(-24deg) rotateY(-32deg);}
  .cube3d.mini .f3d{width:34px;height:34px;font-size:12px;border-radius:5px;border-width:1.5px;}

  .helpline{font-size:11px;color:#79819a;text-align:center;line-height:1.6;padding:0 6px;}
  .helpline b{color:#aeb6c8;}

  /* ---------- cube modal ---------- */
  .modal{
    position:fixed;inset:0;background:rgba(8,10,16,.74);z-index:50;padding:20px;
    display:none;align-items:center;justify-content:center;
  }
  .modal.show{display:flex;}
  .modalInner{
    background:#1b1f2a;border:1px solid #2a3040;border-radius:18px;padding:18px 18px 20px;
    width:300px;max-width:100%;position:relative;
  }
  .modalInner h2{font-size:12px;color:#c3cad9;margin-bottom:12px;font-weight:700;padding-right:22px;}
  .modal .close{
    position:absolute;top:9px;right:11px;background:none;border:none;color:#8b93a7;
    font-size:19px;cursor:pointer;line-height:1;font-family:inherit;
  }
  .viewer{height:170px;perspective:640px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;}
  .viewer:active{cursor:grabbing;}
  .cube3d{width:104px;height:104px;position:relative;transform-style:preserve-3d;transform:rotateX(-24deg) rotateY(-34deg);}
  .f3d{
    position:absolute;width:104px;height:104px;border:2px solid rgba(0,0,0,.35);border-radius:9px;
    display:flex;align-items:center;justify-content:center;font-size:36px;color:rgba(0,0,0,.5);
    backface-visibility:hidden;
  }
  .f3d .lbl{position:absolute;top:5px;left:8px;font-size:10px;font-weight:700;color:rgba(0,0,0,.55);}
  .net{display:grid;grid-template-areas:". n ." "w u e" ". s ." ". d .";
    grid-template-columns:repeat(3,36px);grid-auto-rows:36px;gap:4px;justify-content:center;margin-top:14px;}
  .net div{border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:14px;color:rgba(0,0,0,.5);position:relative;border:1.5px solid rgba(0,0,0,.3);}
  .net div i{position:absolute;top:1px;left:3px;font-size:8px;font-style:normal;font-weight:700;color:rgba(0,0,0,.55);}
  .nN{grid-area:n}.nS{grid-area:s}.nE{grid-area:e}.nW{grid-area:w}.nU{grid-area:u}.nD{grid-area:d}
  .nU{outline:2px solid #fff;outline-offset:1px;}
  .modalHint{font-size:11px;color:#79819a;text-align:center;margin-top:14px;line-height:1.6;}
  .modalHint b{color:#aeb6c8;}
</style>
</head>
<body>
<div class="app">

  <!-- ===== 1. Stage + stats ===== -->
  <div class="topbar card">
    <div class="stageHead">
      <span class="sn" id="stageV">STAGE 1</span>
      <span class="colors" id="colorsV"></span>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" id="movesV">0</div><div class="k">남은 횟수</div></div>
      <div class="stat"><div class="v" id="scoreV">0</div><div class="k">누적 점수</div></div>
      <div class="stat"><div class="v" id="comboV">×1</div><div class="k">최대 콤보</div></div>
    </div>
  </div>

  <!-- ===== 2. Collection goals ===== -->
  <div class="card goalsCard">
    <h2>수집 목표</h2>
    <div class="goalsRow" id="goals"></div>
  </div>

  <!-- ===== 3. Play area ===== -->
  <div class="boardWrap">
    <div id="board">
      <div id="boardInner"></div>
      <button id="skipBtn" onclick="requestSkip()">목표 달성! 스킵 →</button>
      <div id="overlay">
        <div id="ovStars"></div>
        <div id="ovTitle"></div>
        <div id="ovSub"></div>
        <div id="ovBtns"></div>
      </div>
    </div>
  </div>

  <div class="helpline">같은 색 <b>3개</b> 일직선이면 터짐. <b>4개</b>면 <b>라인폭탄</b>(줄 전체), <b>ㄱ/ㄴ자 5개</b>면 <b>광역폭탄</b>(주변 9칸). 폭탄은 그 색으로 라인을 만들면 발동됩니다.</div>

  <!-- ===== 4. Controls ===== -->
  <div class="controls">
    <button class="cubeBtn" onclick="openCube()">
      <span class="miniWrap"><span class="cube3d mini" id="miniCube">
        <span class="f3d" id="m-U"><b class="s"></b></span>
        <span class="f3d" id="m-D"><b class="s"></b></span>
        <span class="f3d" id="m-N"><b class="s"></b></span>
        <span class="f3d" id="m-S"><b class="s"></b></span>
        <span class="f3d" id="m-E"><b class="s"></b></span>
        <span class="f3d" id="m-W"><b class="s"></b></span>
      </span></span>
      이번 큐브 보기
    </button>
    <button onclick="restartStage()">다시</button>
    <button onclick="resetRun()">처음부터</button>
  </div>

</div>

<!-- ===== cube info modal ===== -->
<div class="modal" id="cubeModal">
  <div class="modalInner">
    <button class="close" onclick="closeCube()">✕</button>
    <h2>이번 스테이지의 큐브 · 드래그해서 굴려보기</h2>
    <div class="viewer" id="viewer">
      <div class="cube3d" id="cube3d">
        <div class="f3d" id="v-U"><span class="lbl">보이는 면</span><b class="s"></b></div>
        <div class="f3d" id="v-D"><span class="lbl">반대면</span><b class="s"></b></div>
        <div class="f3d" id="v-N"><span class="lbl">뒤</span><b class="s"></b></div>
        <div class="f3d" id="v-S"><span class="lbl">앞</span><b class="s"></b></div>
        <div class="f3d" id="v-E"><span class="lbl">오른쪽</span><b class="s"></b></div>
        <div class="f3d" id="v-W"><span class="lbl">왼쪽</span><b class="s"></b></div>
      </div>
    </div>
    <div class="net">
      <div class="nN" id="n-N"><i>위</i><b class="s"></b></div>
      <div class="nW" id="n-W"><i>왼</i><b class="s"></b></div>
      <div class="nU" id="n-U"><i>▣</i><b class="s"></b></div>
      <div class="nE" id="n-E"><i>오른</i><b class="s"></b></div>
      <div class="nS" id="n-S"><i>아래</i><b class="s"></b></div>
      <div class="nD" id="n-D"><i>반대</i><b class="s"></b></div>
    </div>
    <div class="modalHint">판 위의 모든 블록은 이 큐브와 <b>같은 색 배치</b>,<br>놓인 방향만 다릅니다</div>
  </div>
</div>

<script>
'use strict';
/* ================= stage config ================= */
const STAGES=[
  {dist:[2,2,2],       goals:[[0,9],[1,9]],        moves:15},
  {dist:[2,2,1,1],     goals:[[0,10],[2,8]],       moves:16},
  {dist:[3,1,1,1],     goals:[[1,8],[2,8]],        moves:17},
  {dist:[2,1,1,1,1],   goals:[[0,10],[1,7],[2,7]], moves:18},
  {dist:[1,1,1,1,1,1], goals:[[0,6],[1,6],[2,6]],  moves:18},
];
function stageConfig(n){
  if(n<STAGES.length)return JSON.parse(JSON.stringify(STAGES[n]));
  const loop=n-STAGES.length;
  const base=JSON.parse(JSON.stringify(STAGES[2+(loop%3)]));
  const scale=1+.15*(Math.floor(loop/3)+1);
  base.goals.forEach(g=>g[1]=Math.round(g[1]*scale));
  base.moves+=1;
  return base;
}

const PALETTE=['#ef476f','#ffd166','#06d6a0','#4cc9f0','#b78bfa','#ff9448'];
const SYMS=['●','▲','■','★','◆','♥'];
const ROWS=6,COLS=6,CELL=64,GAP=8,STEP=CELL+GAP;
const REST='rotateX(14deg)';
const SLOTS=['U','D','N','S','E','W'];

/* ================= state ================= */
let stageNo=0;
let faceColorIdx=[];
let stageColors=[];
let goals=[];
let cfgMoves=0;
let grid=[];
let movesLeft=0,score=0,maxCombo=1;
let busy=false,over=false,idSeq=0;

const $=id=>document.getElementById(id);
const boardInner=$('boardInner');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const colHex=ci=>PALETTE[stageColors[ci]];
const colSym=ci=>SYMS[stageColors[ci]];

/* ================= cube math ================= */
const identOrient=()=>({U:0,D:1,N:2,S:3,E:4,W:5});
function pull(o,d){
  const{U,D,N,S,E,W}=o;
  if(d==='N')return{U:N,N:D,D:S,S:U,E,W};
  if(d==='S')return{U:S,S:D,D:N,N:U,E,W};
  if(d==='E')return{U:E,E:D,D:W,W:U,N,S};
  return{U:W,W:D,D:E,E:U,N,S};
}
function randOrient(){
  let o=identOrient();const ds='NSEW';
  for(let i=0;i<14;i++)o=pull(o,ds[Math.floor(Math.random()*4)]);
  return o;
}
const colIdx=(cube,slot)=>faceColorIdx[cube.orient[slot]];

/* ================= board DOM ================= */
function sizeBoard(){
  boardInner.style.width=(COLS*STEP-GAP)+'px';
  boardInner.style.height=(ROWS*STEP-GAP)+'px';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const s=document.createElement('div');s.className='slot';
    s.style.transform=`translate(${c*STEP}px,${r*STEP}px)`;
    boardInner.appendChild(s);
  }
}
function makeCube(r,c){
  const cube={id:++idSeq,orient:randOrient(),r,c,el:null,wrap:null,f:{},h:{},_g:null};
  const el=document.createElement('div');el.className='cube';
  el.innerHTML=
    '<div class="ringBox">'+
      '<div class="hN"></div><div class="hS"></div><div class="hE"></div><div class="hW"></div>'+
    '</div>'+
    '<div class="cubeBox"><div class="cubeW">'+
      '<div class="cf cfF"><span></span></div>'+
      '<div class="cf cfB"><span></span></div>'+
      '<div class="cf cfT"><span></span></div>'+
      '<div class="cf cfBo"><span></span></div>'+
      '<div class="cf cfR"><span></span></div>'+
      '<div class="cf cfL"><span></span></div>'+
    '</div></div>';
  cube.wrap=el.querySelector('.cubeW');
  cube.f={U:el.querySelector('.cfF'),D:el.querySelector('.cfB'),N:el.querySelector('.cfT'),
          S:el.querySelector('.cfBo'),E:el.querySelector('.cfR'),W:el.querySelector('.cfL')};
  cube.h={N:el.querySelector('.hN'),S:el.querySelector('.hS'),E:el.querySelector('.hE'),W:el.querySelector('.hW')};
  attachGesture(cube,el);
  cube.el=el;boardInner.appendChild(el);
  return cube;
}
function paint(cube){
  for(const slot of SLOTS){
    const ci=colIdx(cube,slot);
    cube.f[slot].style.background=colHex(ci);
    cube.f[slot].querySelector('span').textContent=colSym(ci);
  }
  for(const slot of ['N','S','E','W'])cube.h[slot].style.background=colHex(colIdx(cube,slot));
}
const place=cube=>{cube.el.style.transform=`translate(${cube.c*STEP}px,${cube.r*STEP}px)`;};

// fixed-color bomb token (not a rotatable cube). type 'H' row, 'V' column, 'A' 3x3 area
function makeBomb(r,c,ci,type){
  const bomb={id:++idSeq,r,c,el:null,bomb:true,ci,btype:type};
  const el=document.createElement('div');el.className='cube bomb';
  const inner=type==='A'?'<div class="burst"></div>':'<div class="stripe '+(type==='H'?'stripeH':'stripeV')+'"></div>';
  el.innerHTML='<div class="bombFace" style="background:'+colHex(ci)+'">'+inner+
    '<span class="bsym">'+colSym(ci)+'</span></div>';
  bomb.el=el;boardInner.appendChild(el);
  return bomb;
}

/* ================= drag-to-roll ================= */
const ROLL_T={
  N:'rotateX(104deg)',
  S:'rotateX(-76deg)',
  E:'rotateX(14deg) rotateY(90deg)',
  W:'rotateX(14deg) rotateY(-90deg)'
};
const ROLL_PULL={N:'S',S:'N',E:'W',W:'E'};
function attachGesture(cube,el){
  el.addEventListener('pointerdown',e=>{
    if(busy||over||movesLeft<=0)return;
    e.preventDefault();
    cube._g={x:e.clientX,y:e.clientY,fired:false};
    try{el.setPointerCapture(e.pointerId);}catch(_){}
  });
  el.addEventListener('pointermove',e=>{
    const g=cube._g;
    if(!g||g.fired)return;
    const dx=e.clientX-g.x,dy=e.clientY-g.y;
    if(Math.hypot(dx,dy)<13)return;
    g.fired=true;
    const dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'E':'W'):(dy>0?'S':'N');
    doRoll(cube,dir);
  });
  el.addEventListener('pointerup',()=>cube._g=null);
  el.addEventListener('pointercancel',()=>cube._g=null);
}
async function doRoll(cube,dir){
  if(busy||over||movesLeft<=0)return;
  busy=true;
  movesLeft--;updateHUD();
  const w=cube.wrap;
  w.style.transform=ROLL_T[dir];
  await sleep(265);
  cube.orient=pull(cube.orient,ROLL_PULL[dir]);
  w.style.transition='none';
  w.style.transform=REST;
  paint(cube);
  w.getBoundingClientRect();
  w.style.transition='';
  busy=false;
  lastRolled={r:cube.r,c:cube.c};
  resolve();
}

/* ================= match (line-only, 3+) + bombs ================= */
// effective top color for matching: normal cube -> its U face; bomb -> its fixed color
const topColor=e=>e.bomb?e.ci:colIdx(e,'U');
const entityAt=k=>{const i=k.indexOf(',');return grid[+k.slice(0,i)][+k.slice(i+1)];};
const isBombAt=k=>{const e=entityAt(k);return e&&e.bomb;};

function findRuns(){
  const runs=[];
  for(let r=0;r<ROWS;r++){
    let c=0;
    while(c<COLS){
      if(!grid[r][c]){c++;continue;}
      let c2=c+1;
      while(c2<COLS&&grid[r][c2]&&topColor(grid[r][c2])===topColor(grid[r][c]))c2++;
      if(c2-c>=3){const cells=[];for(let k=c;k<c2;k++)cells.push(grid[r][k]);runs.push({dir:'H',ci:topColor(grid[r][c]),len:c2-c,cells});}
      c=c2;
    }
  }
  for(let c=0;c<COLS;c++){
    let r=0;
    while(r<ROWS){
      if(!grid[r][c]){r++;continue;}
      let r2=r+1;
      while(r2<ROWS&&grid[r2][c]&&topColor(grid[r2][c])===topColor(grid[r][c]))r2++;
      if(r2-r>=3){const cells=[];for(let k=r;k<r2;k++)cells.push(grid[k][c]);runs.push({dir:'V',ci:topColor(grid[r][c]),len:r2-r,cells});}
      r=r2;
    }
  }
  return runs;
}
// any bomb inside clearSet detonates, expanding the set to its row/column (chains through other bombs)
function expandBombs(clearSet){
  const q=[];for(const k of clearSet)if(isBombAt(k))q.push(k);
  const done=new Set();
  while(q.length){
    const k=q.pop();if(done.has(k))continue;done.add(k);
    const b=entityAt(k);if(!b||!b.bomb)continue;
    const cells=[];
    if(b.btype==='H'){for(let c=0;c<COLS;c++)cells.push(b.r+','+c);}
    else if(b.btype==='V'){for(let r=0;r<ROWS;r++)cells.push(r+','+b.c);}
    else{ // 'A' area 3x3
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
        const rr=b.r+dr,cc=b.c+dc;
        if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS)cells.push(rr+','+cc);
      }
    }
    for(const kk of cells){clearSet.add(kk);if(isBombAt(kk)&&!done.has(kk))q.push(kk);}
  }
}

let skipReq=false,lastRolled=null;
function requestSkip(){skipReq=true;$('skipBtn').classList.remove('show');}
async function resolve(){
  busy=true;let mult=1;
  while(true){
    if(skipReq&&goalsDone())break;
    const runs=findRuns();
    if(!runs.length)break;

    // decide bomb spawns. priority: L/T intersection -> area bomb; else 4+ line -> line bomb.
    // (an existing bomb caught in a run is NOT respawned — it detonates via expandBombs)
    const spawns=new Map();
    const hCells=new Set(),vCells=new Set();
    for(const run of runs){const S=run.dir==='H'?hCells:vCells;for(const e of run.cells)S.add(e.r+','+e.c);}
    // area bombs at H∩V intersections (ㄱ/ㄴ자 5매치)
    for(const k of hCells){
      if(vCells.has(k)){
        const e=entityAt(k);
        if(e&&!e.bomb)spawns.set(k,{r:e.r,c:e.c,ci:topColor(e),type:'A'});
      }
    }
    // line bombs for 4+ runs that hold no bomb and don't touch an area-bomb cell
    for(const run of runs){
      if(run.len<4)continue;
      if(run.cells.some(e=>e.bomb))continue;
      if(run.cells.some(e=>{const s=spawns.get(e.r+','+e.c);return s&&s.type==='A';}))continue;
      let cell=null;
      if(mult===1&&lastRolled)cell=run.cells.find(e=>e.r===lastRolled.r&&e.c===lastRolled.c)||null;
      if(!cell)cell=run.cells[Math.floor(run.cells.length/2)];
      const key=cell.r+','+cell.c;
      if(!spawns.has(key))spawns.set(key,{r:cell.r,c:cell.c,ci:run.ci,type:run.dir});
    }

    // clear set = all run cells, except cells that are becoming bombs
    const clearSet=new Set();
    for(const run of runs)for(const e of run.cells){const k=e.r+','+e.c;if(!spawns.has(k))clearSet.add(k);}
    expandBombs(clearSet);
    for(const k of spawns.keys())clearSet.delete(k);

    const cleared=[];
    for(const k of clearSet){const e=entityAt(k);if(e)cleared.push(e);}
    cleared.forEach(e=>{const g=goals.find(g=>g.ci===topColor(e));if(g)g.got++;});
    score+=cleared.length*10*mult;
    maxCombo=Math.max(maxCombo,mult);
    if(goalsDone()&&!over)$('skipBtn').classList.add('show');
    if(mult>1)showFloat('콤보 ×'+mult+'!');
    else if(cleared.length>=5)showFloat(cleared.length+'개 동시!');

    cleared.forEach(e=>{
      e.el.style.transform=`translate(${e.c*STEP}px,${e.r*STEP}px) scale(.12)`;
      e.el.style.opacity=0;
    });
    updateHUD();
    lastRolled=null;
    await sleep(290);
    cleared.forEach(e=>{e.el.remove();grid[e.r][e.c]=null;});

    // place new bombs — pop in at the spawn cell (no slide from origin), then let gravity drop them
    const fresh=[];
    for(const s of spawns.values()){
      const old=grid[s.r][s.c];if(old)old.el.remove();
      const b=makeBomb(s.r,s.c,s.ci,s.type);grid[s.r][s.c]=b;
      b.el.style.transition='none';
      place(b);                       // snap to spawn cell instantly
      b.el.getBoundingClientRect();
      b.el.style.transition='';
      b.el.classList.add('spawning'); // triggers 뿅 pop + flash ring
      fresh.push(b);
    }
    if(fresh.length)setTimeout(()=>fresh.forEach(b=>b.el&&b.el.classList.remove('spawning')),440);

    // gravity + refill
    for(let c=0;c<COLS;c++){
      const stack=[];
      for(let r=ROWS-1;r>=0;r--)if(grid[r][c])stack.push(grid[r][c]);
      for(let r=ROWS-1;r>=0;r--){
        const e=stack[ROWS-1-r]||null;
        grid[r][c]=e;
        if(e){e.r=r;e.c=c;place(e);}
      }
      const need=ROWS-stack.length;
      for(let r=0;r<need;r++){
        const cu=makeCube(r,c);
        grid[r][c]=cu;paint(cu);
        cu.el.style.transition='none';
        cu.el.style.transform=`translate(${c*STEP}px,${(r-need)*STEP}px)`;
        cu.el.getBoundingClientRect();
        cu.el.style.transition='';
        place(cu);
      }
    }
    await sleep(330);
    mult++;
  }
  $('skipBtn').classList.remove('show');
  skipReq=false;busy=false;lastRolled=null;
  checkEnd();
}

/* ================= game flow ================= */
const goalsDone=()=>goals.every(g=>g.got>=g.need);
function checkEnd(){
  if(over)return;
  if(goalsDone()){winStage();return;}
  if(movesLeft<=0)failStage();
}
function starCount(){
  const ratio=movesLeft/cfgMoves;
  return ratio>=.3?3:ratio>=.12?2:1;
}
function winStage(){
  over=true;
  const s=starCount();
  score+=movesLeft*20;
  $('ovStars').innerHTML='★★★'.split('').map((c,i)=>i<s?'<span>★</span>':'<span class="off">★</span>').join('');
  $('ovTitle').textContent='STAGE '+(stageNo+1)+' 클리어!';
  $('ovTitle').style.color='#06d6a0';
  $('ovSub').innerHTML='남은 횟수 보너스 +'+(movesLeft*20)+' · 누적 점수 <b>'+score+'</b>';
  $('ovBtns').innerHTML='<button class="primary" onclick="nextStage()">다음 스테이지 →</button>';
  $('overlay').classList.add('show');
  updateHUD();
}
function failStage(){
  over=true;
  $('ovStars').innerHTML='';
  $('ovTitle').textContent='😵 횟수 소진…';
  $('ovTitle').style.color='#ff5d73';
  const left=goals.filter(g=>g.got<g.need).map(g=>colSym(g.ci)+' '+(g.need-g.got)+'개').join(' · ');
  $('ovSub').innerHTML='남은 목표: '+left;
  $('ovBtns').innerHTML='<button class="primary" onclick="restartStage()">다시 도전</button><button onclick="resetRun()">처음부터</button>';
  $('overlay').classList.add('show');
}
function updateHUD(){
  $('stageV').textContent='STAGE '+(stageNo+1);
  $('colorsV').textContent=stageColors.length+'색 큐브';
  $('movesV').textContent=movesLeft;
  $('movesV').classList.toggle('low',movesLeft<=4);
  $('scoreV').textContent=score;
  $('comboV').textContent='×'+maxCombo;
  $('goals').innerHTML=goals.map(g=>{
    const pct=Math.min(100,g.got/g.need*100);
    const done=g.got>=g.need;
    return '<div class="gchip'+(done?' done':'')+'">'+
      '<div class="dot" style="background:'+colHex(g.ci)+'">'+colSym(g.ci)+'</div>'+
      '<div class="bar"><span style="width:'+pct+'%;background:'+colHex(g.ci)+'"></span></div>'+
      '<div class="cnt">'+(done?'완료':Math.min(g.got,g.need)+'/'+g.need)+'</div>'+
    '</div>';
  }).join('');
}
function showFloat(txt){
  const d=document.createElement('div');d.className='float';d.textContent=txt;
  $('board').appendChild(d);
  setTimeout(()=>d.remove(),900);
}
function buildBoard(){
  boardInner.querySelectorAll('.cube').forEach(e=>e.remove());
  grid=[...Array(ROWS)].map(()=>Array(COLS).fill(null));
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cu=makeCube(r,c);grid[r][c]=cu;paint(cu);place(cu);
  }
  let guard=0;
  while(guard++<160){
    const runs=findRuns();
    if(!runs.length)break;
    runs.forEach(run=>run.cells.forEach(cu=>{if(!cu.bomb){cu.orient=randOrient();paint(cu);}}));
  }
}
function setupStage(n,keepScore){
  stageNo=n;
  const cfg=stageConfig(n);
  const k=cfg.dist.length;
  stageColors=shuffle([0,1,2,3,4,5]).slice(0,k);
  const faces=[];
  cfg.dist.forEach((cnt,i)=>{for(let j=0;j<cnt;j++)faces.push(i);});
  faceColorIdx=shuffle(faces);
  goals=cfg.goals.map(([ci,need])=>({ci,need,got:0}));
  cfgMoves=cfg.moves;
  movesLeft=cfg.moves;maxCombo=1;over=false;busy=false;
  if(!keepScore)score=0;
  skipReq=false;$('skipBtn').classList.remove('show');
  renderViewer();renderNet();buildBoard();
  $('overlay').classList.remove('show');
  updateHUD();
}
function nextStage(){setupStage(stageNo+1,true);}
function restartStage(){setupStage(stageNo,true);}
function resetRun(){setupStage(0,false);}

/* ================= cube preview (modal + mini) ================= */
function faceTransforms(half){
  return {
    U:'rotateX(90deg) translateZ('+half+'px)',
    D:'rotateX(-90deg) translateZ('+half+'px)',
    N:'rotateY(180deg) translateZ('+half+'px)',
    S:'translateZ('+half+'px)',
    E:'rotateY(90deg) translateZ('+half+'px)',
    W:'rotateY(-90deg) translateZ('+half+'px)'
  };
}
function paintCubeFaces(prefix,half){
  const io=identOrient();const T=faceTransforms(half);
  for(const slot of SLOTS){
    const el=$(prefix+slot);if(!el)continue;
    el.style.transform=T[slot];
    el.style.background=colHex(faceColorIdx[io[slot]]);
    const s=el.querySelector('.s');if(s)s.textContent=colSym(faceColorIdx[io[slot]]);
  }
}
function renderViewer(){
  paintCubeFaces('v-',52);
  paintCubeFaces('m-',17);
}
function renderNet(){
  const io=identOrient();
  for(const slot of SLOTS){
    const el=$('n-'+slot);
    el.style.background=colHex(faceColorIdx[io[slot]]);
    el.querySelector('.s').textContent=colSym(faceColorIdx[io[slot]]);
  }
}
function openCube(){$('cubeModal').classList.add('show');}
function closeCube(){$('cubeModal').classList.remove('show');}
$('cubeModal').addEventListener('pointerdown',e=>{if(e.target===$('cubeModal'))closeCube();});

let rotX=-24,rotY=-34,dragging=false,lx=0,ly=0;
const viewer=$('viewer'),cube3d=$('cube3d');
viewer.addEventListener('pointerdown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;try{viewer.setPointerCapture(e.pointerId);}catch(_){}});
viewer.addEventListener('pointermove',e=>{
  if(!dragging)return;
  rotY+=(e.clientX-lx)*.55;rotX-=(e.clientY-ly)*.55;
  lx=e.clientX;ly=e.clientY;
  cube3d.style.transform='rotateX('+rotX+'deg) rotateY('+rotY+'deg)';
});
viewer.addEventListener('pointerup',()=>dragging=false);
viewer.addEventListener('pointercancel',()=>dragging=false);

/* ================= responsive ================= */
function fitBoard(){
  const natural=COLS*STEP-GAP+22;
  const vw=Math.min(document.documentElement.clientWidth,screen.width||99999);
  const sc=Math.min(1,(vw-14)/natural);
  $('board').style.zoom=sc;
}
window.addEventListener('resize',fitBoard);

/* ================= init ================= */
sizeBoard();
setupStage(0,false);
fitBoard();
</script>
